name: Build Xyris arm64e
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          curl -L "https://github.com/theos/sdks/archive/refs/heads/master.tar.gz" -o sdks.tar.gz
          tar -xzf sdks.tar.gz --strip-components=1 -C $HOME/theos/sdks/ '*/iPhoneOS16.5.sdk'

      # ── УРОВЕНЬ 1+2: brew llvm@17 + Obscura + Hikari ──────────────────
      # Используем brew clang вместо Apple clang — он совместим с обоими плагинами
      # без segfault. Apple clang крашит с universal plugin из-за ABI mismatch.
      - name: Install LLVM 17
        run: |
          brew install llvm@17 ninja cmake
          LLVM_PREFIX=$(brew --prefix llvm@17)
          echo "LLVM_PREFIX=$LLVM_PREFIX"       >> $GITHUB_ENV
          echo "LLVM_BIN=$LLVM_PREFIX/bin"      >> $GITHUB_ENV
          # brew clang совместим с обоими плагинами
          echo "CC=$LLVM_PREFIX/bin/clang"      >> $GITHUB_ENV
          echo "CXX=$LLVM_PREFIX/bin/clang++"   >> $GITHUB_ENV

      - name: Install Obscura
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Available Obscura assets ==="
          gh release view v1.0.0 --repo nkhmelni/Obscura \
            --json assets -q '.assets[].name'

          # Xcode 16 = LLVM 17, universal работает с brew clang
          XCODE_MAJOR=$(xcodebuild -version | head -1 | awk '{print $2}' | cut -d. -f1)
          [ "$XCODE_MAJOR" -ge 16 ] && LLVM_VER="17.0.6" || LLVM_VER="16.0.0"
          echo "Xcode $XCODE_MAJOR → Obscura LLVM $LLVM_VER"

          mkdir -p $HOME/obscura && cd $HOME/obscura
          gh release download v1.0.0 --repo nkhmelni/Obscura \
            --pattern "*llvm${LLVM_VER}*universal*"
          tar -xf *.tar.*
          ls -la lib/ include/

          echo "OBSCURA_LIB=$(pwd)/lib/libObscura.dylib"  >> $GITHUB_ENV
          echo "OBSCURA_INCLUDE=$(pwd)/include"            >> $GITHUB_ENV

      - name: Build Hikari pass
        run: |
          git clone --depth=1 https://github.com/lich4/llvm-pass-hikari \
            $HOME/ollvm-pass
          cd $HOME/ollvm-pass

          LLVM_CMAKE="$LLVM_PREFIX/lib/cmake/llvm"
          cmake -S hikari -G Ninja -B hikari/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$LLVM_CMAKE"
          cmake --build hikari/build

          HIKARI_LIB=$(find $HOME/ollvm-pass/hikari/build -name "*.dylib" | head -1)
          echo "HIKARI_LIB=$HIKARI_LIB" >> $GITHUB_ENV
          echo "Hikari built: $HIKARI_LIB"

      - name: Verify plugins
        run: |
          echo "int x = 0x1337;" > /tmp/t.c
          # Тест Obscura
          $LLVM_BIN/clang \
            -fpass-plugin="$OBSCURA_LIB" \
            -DENC_FULL -DENC_DEEP_INLINE -DL2G_ENABLE \
            -I"$OBSCURA_INCLUDE" -include "$OBSCURA_INCLUDE/config.h" \
            -target arm64-apple-ios14.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -c /tmp/t.c -o /tmp/t_obscura.o && echo "Obscura: OK" || echo "Obscura: FAIL"
          # Тест Hikari
          $LLVM_BIN/clang \
            -fpass-plugin="$HIKARI_LIB" \
            -target arm64-apple-ios14.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -c /tmp/t.c -o /tmp/t_hikari.o && echo "Hikari: OK" || echo "Hikari: FAIL"

      - name: Setup Hikari policy
        run: |
          cat > policy.json << 'POLICY'
{
  "globals": { "aesSeed": 31337 },
  "policy_map": {
    "module_policy": {
      "acd-use-initialize": true
    },
    "func_policy": {
      "enable-bcfobf":      true,
      "bcf_prob":           70,
      "bcf_loop":           2,
      "enable-cffobf":      true,
      "enable-strcry":      true,
      "enable-acdobf":      true,
      "enable-indibran":    true,
      "indibran-use-stack": true
    }
  },
  "policies": [
    { "module": ".*",           "policy": "module_policy" },
    { "module": ".*", "func": ".*", "policy": "func_policy" }
  ]
}
POLICY
          echo "policy.json ready"

      - name: Build
        run: |
          make clean
          make package ARCHS="arm64 arm64e" 2>&1 | tee build.log
          echo "=== ERRORS ==="
          grep "error:" build.log | head -20 || true

      - name: Upload tipa
        uses: actions/upload-artifact@v4
        with:
          name: Fryzz-arm64e
          path: packages/*.tipa
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
